<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>咕咕嘎嘎</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background: #ffffff; 
            position: relative;
            overflow: hidden;
        }

        .center-img {
            width: 200px; 
            height: 200px;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            cursor: pointer;
            z-index: 10; 
            transition: opacity 0.2s ease; 
        }

        .center-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .center-img:hover {
            opacity: 0; 
        }

        .fullscreen-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: url("3.jpg");
            background-repeat: repeat;
            background-size: 100px 100px; 
            opacity: 0; 
            pointer-events: none; 
            transition: opacity 0.2s ease; 
            z-index: 5;
        }

        .center-img:hover + .fullscreen-overlay {
            opacity: 1; 
        }
    </style>
</head>
<body>

    <div class="center-img">
        <img src="3.jpg" alt="中心主图">
    </div>

    <div class="fullscreen-overlay"></div>
</body>
</html>
